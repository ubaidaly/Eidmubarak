<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Special Greeting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #0f2027;
            background: linear-gradient(to bottom, #2c5364, #203a43, #0f2027);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Greeting Card Design */
        #greetingCard {
            width: 90%;
            max-width: 350px;
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: #1a2a33;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            border: 5px solid rgba(255,255,255,0.2);
            position: relative;
        }

        .card-content h1 { font-size: 28px; margin-bottom: 5px; color: #1a2a33; }
        .card-content p { font-size: 18px; font-weight: 500; }
        .from-text { margin-top: 20px; font-style: italic; font-weight: bold; }

        .controls {
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-generate { background: #d4af37; color: black; }
        .btn-whatsapp { background: #25D366; color: white; }

        #previewImg { display: none; width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="text-align: center; color: gold;">🌙 Eid Card Creator</h2>
        <input type="text" id="yourName" placeholder="Apna Naam Likhein">
        <input type="text" id="friendName" placeholder="Friend Ka Naam Likhein">
        <button class="btn-generate" onclick="generateCard()">1. Create Card</button>
        <p id="status" style="font-size: 12px; text-align: center; color: #ffeb3b;"></p>
    </div>

    <div id="greetingCard">
        <div class="card-content">
            <h1>🌙</h1>
            <h1>Eid Mubarak</h1>
            <p id="toMsg">Dear Friend,</p>
            <p>Khushiyon Bhari Eid Mubarak! ❤️<br>Allah aapko hamesha salamat rakhe.</p>
            <p class="from-text" id="fromMsg">From: Raja Ali</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn-whatsapp" onclick="shareAsImage()">2. Share on WhatsApp</button>
        <p style="font-size: 11px; opacity: 0.7; text-align: center;">Note: Mobile par "Share" par click karein aur WhatsApp select karein.</p>
    </div>

    <script>
        function generateCard() {
            let y = document.getElementById("yourName").value;
            let f = document.getElementById("friendName").value;

            if (y == "" || f == "") {
                alert("Please enter both names!");
                return;
            }

            document.getElementById("toMsg").innerText = "Dear " + f + ",";
            document.getElementById("fromMsg").innerText = "From: " + y;
            document.getElementById("status").innerText = "Card ready! Ab share karein.";
        }

        async function shareAsImage() {
            const card = document.getElementById("greetingCard");
            
            // Step 1: Convert HTML to Canvas
            const canvas = await html2canvas(card);
            
            // Step 2: Convert Canvas to Blob (Image file)
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'eid-wishes.png', { type: 'image/png' });
                
                // Step 3: Use Web Share API (Works on most mobile browsers)
                if (navigator.share) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Eid Mubarak',
                            text: 'Sending you a special Eid wish!'
                        });
                    } catch (err) {
                        console.error("Error sharing:", err);
                    }
                } else {
                    // Fallback for desktop: Download the image
                    const link = document.createElement('a');
                    link.download = 'eid-mubarak.png';
                    link.href = canvas.toDataURL();
                    link.click();
                    alert("Sharing direct image browser par depend karta hai. Image download ho gayi hai, ab aap WhatsApp par manually bhej sakte hain.");
                }
            }, 'image/png');
        }
    </script>
</body>
         </html>
