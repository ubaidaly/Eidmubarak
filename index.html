<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Wishes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Flowers */
.flower {
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Lights */
.glow {
    position: absolute;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: blink 2s infinite alternate;
}

@keyframes blink {
    from {opacity: 0.3;}
    to {opacity: 1;}
}

.container {
    padding: 20px;
    max-width: 400px;
    margin: auto;
    position: relative;
    z-index: 2;
}

h1 {
    color: gold;
    text-shadow: 0 0 10px gold;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.generate { background: gold; }
.whatsapp { background: #25D366; color: white; }
.share { background: #3498db; color: white; }

.message {
    margin-top: 15px;
    padding: 10px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    white-space: pre-line;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- Animation Script -->
<script>
for(let i=0;i<20;i++){
 let f=document.createElement("div");
 f.className="flower";
 f.style.left=Math.random()*100+"%";
 document.body.appendChild(f);
}
for(let i=0;i<25;i++){
 let g=document.createElement("div");
 g.className="glow";
 g.style.top=Math.random()*100+"%";
 g.style.left=Math.random()*100+"%";
 document.body.appendChild(g);
}
</script>

<div class="container">
<h1>🌙 Eid Mubarak</h1>

<div class="card">

<input type="text" id="yourName" placeholder="Your Name">
<input type="text" id="friendName" placeholder="Friend Name">

<button class="generate" onclick="generateWish()">Generate</button>
<button class="whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
<button class="share" onclick="copyLink()">Copy Link</button>

<div class="message" id="output"></div>

<!-- Eid Song Auto Play -->
<div style="margin-top:15px;">
  <iframe width="100%" height="200"
    src="https://www.youtube.com/embed/AhU4o8a1kpc?autoplay=1&mute=1&loop=1&playlist=AhU4o8a1kpc"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

</div>

<div class="footer">Made by Raja Ali</div>
</div>

<script>
let finalMessage = "";

function generateWish(){
 let y=document.getElementById("yourName").value;
 let f=document.getElementById("friendName").value;

 if(y=="" || f==""){
   alert("Enter names!");
   return;
 }

 finalMessage = "🌙 Eid Mubarak " + f + "!\n\n" +
 "Meri taraf se Eid Mubarak ❤️\n" +
 "Allah tumhe hamesha khush rakhe 🤲\n\n- " + y;

 document.getElementById("output").innerText = finalMessage;
}

function shareWhatsApp(){
 if(finalMessage==""){
   alert("Generate first!");
   return;
 }
 let url="https://wa.me/?text="+encodeURIComponent(finalMessage);
 window.open(url,"_blank");
}

function copyLink(){
 if(finalMessage==""){
   alert("Generate first!");
   return;
 }
 navigator.clipboard.writeText(finalMessage);
 alert("Message copied! Share anywhere 🔗");
}
</script>

</body>
</html>
